# octocov configuration - https://github.com/k1LoW/octocov
#
# Pull-request config: identical to .octocov.yml except the gate adds the
# no-regression check (diff >= 0), so a PR cannot lower coverage versus the
# base branch. The default branch deliberately omits this check (floor only)
# to avoid a coverage blip red-Xing master; keep the rest of this file in sync
# with .octocov.yml.
#
# `tests/_output/coverage.xml` here is the MERGED report (unit + all three
# database driver legs), produced by `bin/merge-coverage.php` in the
# "Merge coverage reports" workflow step - the same merged file SonarQube
# reads, so the two dashboards never disagree with each other.
coverage:
  paths:
    - tests/_output/coverage.xml
  acceptable: "current >= 84.4% && diff >= 0"
  badge:
    path: tests/_output/coverage.svg
codeToTestRatio:
  code:
    - src/**/*.php
  test:
    - tests/**/*.php
testExecutionTime:
  steps:
    - Tests with coverage
    - Run Database Tests (MySQL)
    - Run Database Tests (Postgres)
    - Run Database Tests (SQLite)
comment:
  if: is_pull_request
summary:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
