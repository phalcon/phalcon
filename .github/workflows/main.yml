          fetch-depth: 1
          token: ${{ github.token }}

      - name: Setup platform specific environment
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          ini-values: apc.enable_cli=on, session.save_path=/tmp
          tools: pecl, phpize, php-config, composer:v2
          coverage: pcov
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHALCON_PATH: ext

      - name: Validate composer
        run: composer validate --no-check-all --no-check-publish

      - name: Install development dependencies with Composer
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
        with:
          composer-options: "--prefer-dist --ignore-platform-reqs"

      - name: Setup Tests
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ./resources/linux-setup-locales.sh
          fi

          cp tests/support/_config/.env.default .env
          php bin/generate-db-schemas.php

      - name: Run Database Tests (SQLite)
        env:
          DATA_REDIS_PORT: ${{ job.services.redis.ports['6379'] }}
          DATA_MEMCACHED_PORT: ${{ job.services.memcached.ports['11211'] }}
        run: composer test-db-sqlite-coverage

      - name: Upload coverage file artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: "db-sqlite-${{ matrix.php }}.coverage"
          path: "tests/_output/coverage.cov"
          retention-days: 7

  upload-coverage:
    name: Merge coverage and report

    permissions:
      contents: read
      pull-requests: write # to comment coverage on PRs (octocov)
      actions: read # to download prior coverage artifacts (octocov)

    runs-on: ubuntu-latest

    needs:
      - phpcs
      - unit-tests
      - db-mysql-tests
      - db-postgres-tests
      - db-sqlite-tests

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: "Setup PHP"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: ${{ env.EXTENSIONS }}
          tools: pecl, phpize, php-config, composer:v2
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PHALCON_PATH: ext

      - name: "Install development dependencies with Composer"
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
        with:
          composer-options: "--prefer-dist --ignore-platform-reqs"

      - name: Create directory for coverage files
        run: mkdir -p cv

      - name: Download coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: cv

      - name: "Merge coverage reports"
        run: mkdir -p tests/_output && php -d memory_limit=4G bin/merge-coverage.php cv tests/_output/coverage.xml

      - name: Official SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.php.coverage.reportPaths=tests/_output/coverage.xml
            -Dsonar.verbose=true

      - name: "octocov"
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: ${{ github.event_name == 'pull_request' && 'resources/octocov.pr.yml' || 'resources/octocov.yml' }}

      - name: "Upload coverage badge"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-badge
          path: tests/_output/coverage.svg
          if-no-files-found: ignore
